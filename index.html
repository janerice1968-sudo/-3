<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="google" content="notranslate">
  <title>Access Verification</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6fb;
      font-family: Arial, Helvetica, sans-serif;
      color: #1a1a1a;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .icon {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0;
      font-size: 26px;
    }

    p {
      margin: 0;
      color: #555;
      font-size: 15px;
      line-height: 1.6;
    }

    .box {
      margin: 20px 0;
      padding: 14px;
      background: #f1f3f9;
      border-radius: 10px;
      font-size: 14px;
      color: #444;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1e4fd1;
    }

    .timer {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
    }

    .timer span {
      font-weight: bold;
      color: #2563eb;
    }

    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="icon">🔒</div>

  <h1>Access Verification</h1>

  <p>Please confirm to continue.</p>

  <div class="box">
    Secure connection initialized<br>
    Preparing your access...
  </div>

  <!-- 必须保留这个结构 -->
  <a class="btn" id="enterBtn" href=" ">
    Continue ▶
  </a>

  <div class="timer">
    Redirecting in <span id="count">2</span>s...
  </div>

  <div class="footer">
    Secure session · Encrypted
  </div>

</div>

<script>

const OFFER = "https://t.acrsmartcam.com/406599/8873/0?aff_sub5=SF_006OG000004lmDN";

// 按钮跳转（隐藏真实链接）
document.getElementById("enterBtn").href = OFFER;

// 延迟逻辑（仅用于倒计时，不自动跳）
var delay = 2000;

// 倒计时
var time = Math.ceil(delay / 1000);
var count = document.getElementById("count");
count.innerText = time;

var timer = setInterval(function(){
  time--;
  if(time <= 0){
    clearInterval(timer);
  } else {
    count.innerText = time;
  }
},1000);

</script>

</body>
</html>
