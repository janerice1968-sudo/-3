<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Verification Required</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .content-box {
            text-align: center;
            padding: 30px 20px;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            background-color: #0f0f0f;
            max-width: 350px;
            width: 85%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .warning-title {
            color: #ff3b30;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .warning-text {
            font-size: 15px;
            color: #a0a0a0;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px 0;
            background-color: #ff3b30;
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            box-sizing: border-box;
            text-align: center;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:active {
            background-color: #cc2f26;
            transform: translateY(1px);
        }

        .footer-note {
            margin-top: 20px;
            font-size: 11px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <div class="warning-title">18+ 专属内容验证</div>
        <div class="warning-text">
            本区域包含成人限制级内容。<br>
            请确认您已年满 18 周岁。
        </div>

        <a class="btn" id="enterBtn" href="https://t.crdtg2.com/406599/9953/37712?aff_sub5=SF_006OG000004lmDN">
            确认已满18岁并进入
        </a>

        <div class="footer-note">
            Continuing implies consent to our terms.
        </div>
    </div>

</body>
</html>
